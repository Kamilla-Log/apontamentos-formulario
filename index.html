<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apontamentos — Formulário de Pagamentos | Logcomex</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Funnel+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F6FC;font-family:'Poppins',sans-serif;font-size:13px;color:#0B0D19}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px}
.header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:2px solid #E2D0FA}
.header-text h1{font-family:'Funnel Display',sans-serif;font-size:22px;color:#2D085D;line-height:1.2}
.header-text p{font-size:11px;color:#5F616A;margin-top:3px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;border:1px solid rgba(11,13,25,.09);padding:12px 16px}
.kpi-lbl{font-size:10px;color:#5F616A;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.kpi-val{font-size:26px;font-weight:600;line-height:1;color:#0B0D19}
.kpi-val.d{color:#C70404}.kpi-val.w{color:#C99D02}.kpi-val.g{color:#1FAC66}
.prog-wrap{margin-bottom:20px}
.prog-top{display:flex;justify-content:space-between;font-size:11px;color:#5F616A;margin-bottom:5px}
.prog-bar{height:6px;background:rgba(11,13,25,.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#6613D0;border-radius:3px;transition:width .5s}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filters select,.filters input{font-family:'Poppins',sans-serif;font-size:12px;padding:6px 10px;height:34px;border-radius:8px;border:1px solid rgba(11,13,25,.12);background:#fff;color:#0B0D19;outline:none;cursor:pointer}
.filters select:focus,.filters input:focus{border-color:#6613D0}
.save-msg{font-size:11px;color:#1FAC66;margin-left:auto;opacity:0;transition:opacity .4s;display:flex;align-items:center;gap:5px;font-weight:500}
.save-msg.show{opacity:1}

/* Card */
.card{background:#fff;border-radius:12px;border:1px solid rgba(11,13,25,.09);margin-bottom:10px;overflow:hidden;transition:opacity .3s}
.card.done{opacity:.45}
.card-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px 12px}
.num{width:28px;height:28px;min-width:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#F3EDFC;color:#2D085D;flex-shrink:0;margin-top:1px}
.titulo{font-size:13px;font-weight:600;color:#0B0D19;line-height:1.45;flex:1}
.titulo.riscado{text-decoration:line-through;color:#aaa}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.ba{background:#FDEAEA;color:#C70404}.bm{background:#FDF8E1;color:#C99D02}.bb{background:#E8F8F0;color:#1FAC66}

/* Duas colunas */
.card-cols{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid rgba(11,13,25,.07)}
.col{padding:12px 16px;border-right:1px solid rgba(11,13,25,.07)}
.col:last-child{border-right:none}
.col-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.col-lbl.acao{color:#2D085D}
.col-lbl.prazo{color:#C99D02}
.col-lbl.prob{color:#C70404}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-acao{background:#6613D0}.dot-prazo{background:#C99D02}.dot-prob{background:#C70404}
.col-val{font-size:12px;color:#0B0D19;line-height:1.55}

/* Rodapé do card */
.card-foot{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid rgba(11,13,25,.06);background:#FAFAFE}
.foot-status select{font-family:'Poppins',sans-serif;font-size:11px;padding:4px 8px;height:28px;border-radius:6px;border:1px solid rgba(11,13,25,.12);background:#fff;color:#0B0D19;outline:none;cursor:pointer;min-width:130px}
.foot-status select:focus{border-color:#6613D0}
.foot-comment{flex:1}
.foot-comment input{font-family:'Poppins',sans-serif;font-size:11px;padding:4px 8px;height:28px;border-radius:6px;border:1px solid rgba(11,13,25,.12);background:#fff;color:#0B0D19;outline:none;width:100%}
.foot-comment input::placeholder{color:#aaa}
.foot-comment input:focus{border-color:#6613D0}
.prazo-input{font-family:'Poppins',sans-serif;font-size:11px;padding:4px 8px;height:28px;border-radius:6px;border:1px solid rgba(11,13,25,.12);background:#fff;color:#0B0D19;outline:none;width:120px}
.prazo-input::placeholder{color:#aaa}
.prazo-input:focus{border-color:#C99D02;border-color:#C99D02}
.prazo-lbl{font-size:10px;color:#C99D02;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.chk-box{width:24px;height:24px;border-radius:6px;border:2px solid rgba(11,13,25,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;transition:all .15s;flex-shrink:0}
.chk-box:hover{border-color:#1FAC66}
.chk-box.checked{background:#1FAC66;border-color:#1FAC66}
.chk-box svg{display:none}
.chk-box.checked svg{display:block}
.chk-lbl{font-size:10px;color:#5F616A;font-weight:500;white-space:nowrap}

/* Campos editáveis inline */
[contenteditable="true"]{border-radius:4px;padding:2px 4px;margin:-2px -4px;transition:background .15s,outline .15s;outline:none;cursor:text}
[contenteditable="true"]:hover{background:rgba(102,19,208,.05)}
[contenteditable="true"]:focus{background:rgba(102,19,208,.08);outline:1px solid rgba(102,19,208,.25)}
.hidden{display:none!important}
.empty-msg{font-size:13px;color:#5F616A;text-align:center;padding:32px 0}
.loader{position:fixed;inset:0;background:rgba(245,246,252,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.loader.hidden{display:none}
.spinner{width:28px;height:28px;border:3px solid #E2D0FA;border-top-color:#6613D0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:13px;color:#2D085D;font-weight:500}
.toast{position:fixed;bottom:24px;right:24px;background:#2D085D;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}
.toast.show{opacity:1}
@media(max-width:700px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .card-cols{grid-template-columns:1fr}
  .col{border-right:none;border-bottom:1px solid rgba(11,13,25,.07)}
  .col:last-child{border-bottom:none}
  .card-foot{flex-wrap:wrap}
}
</style>
</head>

</div>

let state={};

async function dbLoad(){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+TABLE+'?select=*',{headers:H});
    if(!r.ok)return false;
    const rows=await r.json();
    rows.forEach(row=>{state[row.id]={status:row.status||'Pendente',comment:row.comment||'',done:row.done||false,prazo_real:row.prazo_real||''}});
    return true;
  }catch(e){return false}
}

async function dbUpsert(id){
  const s=state[id]||{status:'Pendente',comment:'',done:false,prazo_real:''};
  try{
    await fetch(SUPA_URL+'/rest/v1/'+TABLE,{
      method:'POST',
      headers:{...H,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id,status:s.status,comment:s.comment,done:s.done,prazo_real:s.prazo_real,updated_at:new Date().toISOString()})
    });
  }catch(e){}
}

function showSaved(){
  const m=document.getElementById('saveMsg');
  m.classList.add('show');
  clearTimeout(window._st);
  window._st=setTimeout(()=>m.classList.remove('show'),2200);
}

function getS(id){return state[id]||{status:'Pendente',comment:'',done:false,prazo_real:''}}

function setField(id,key,val){
  if(!state[id])state[id]={status:'Pendente',comment:'',done:false,prazo_real:''};
  state[id][key]=val;
  if(key==='done'){
    state[id].status=val?'Concluído':(state[id].status==='Concluído'?'Pendente':state[id].status);
    const sel=document.querySelector('#card-'+id+' .foot-sel');
    if(sel)sel.value=state[id].status;
    const card=document.getElementById('card-'+id);
    if(card){card.classList.toggle('done',val);card.dataset.status=state[id].status}
    const box=document.querySelector('#card-'+id+' .chk-box');
    if(box)box.classList.toggle('checked',val);
    const t=document.querySelector('#card-'+id+' .titulo');
    if(t)t.classList.toggle('riscado',val);
  }
  if(key==='status'){
    state[id].done=val==='Concluído';
    const card=document.getElementById('card-'+id);
    if(card){card.classList.toggle('done',state[id].done);card.dataset.status=val}
    const box=document.querySelector('#card-'+id+' .chk-box');
    if(box)box.classList.toggle('checked',state[id].done);
    const t=document.querySelector('#card-'+id+' .titulo');
    if(t)t.classList.toggle('riscado',state[id].done);
  }
  dbUpsert(id);showSaved();updateKPIs();applyFilters();
}

function editField(id,field,el){
  const txt=el.innerText.trim();
  if(!txt)return;
  const pt=POINTS.find(p=>p.id===id);
  if(pt)pt[field]=txt;
  const card=document.getElementById('card-'+id);
  if(card)card.dataset.text=(POINTS.find(p=>p.id===id).titulo+POINTS.find(p=>p.id===id).acao+POINTS.find(p=>p.id===id).prob).toLowerCase();
  showSaved();
}

function badgeCls(p){return p==='Alta'?'ba':p==='Média'?'bm':'bb'}
function prioSlug(p){return p==='Alta'?'alta':p==='Média'?'media':'baixa'}

function cardHTML(pt){
  const s=getS(pt.id);
  return `<div class="card prio-${prioSlug(pt.prio)}${s.done?' done':''}" id="card-${pt.id}" data-prio="${pt.prio}" data-status="${s.status}" data-text="${(pt.titulo+pt.acao+pt.prob).toLowerCase()}">
  <div class="card-head">
    <div class="num">${pt.id}</div>
    <div class="titulo${s.done?' riscado':''}" contenteditable="true" spellcheck="false" onblur="editField(${pt.id},'titulo',this)">${pt.titulo}</div>
    <span class="badge ${badgeCls(pt.prio)}">${pt.prio}</span>
  </div>
  <div class="card-cols">
    <div class="col">
      <div class="col-lbl acao"><span class="col-dot dot-acao"></span>Ação necessária</div>
      <div class="col-val" contenteditable="true" spellcheck="false" onblur="editField(${pt.id},'acao',this)">${pt.acao}</div>
    </div>
    <div class="col">
      <div class="col-lbl prob"><span class="col-dot dot-prob"></span>Problema se soltar agora</div>
      <div class="col-val" contenteditable="true" spellcheck="false" onblur="editField(${pt.id},'prob',this)">${pt.prob}</div>
    </div>
  </div>
  <div class="card-foot">
    <div class="foot-status">
      <select class="foot-sel" onchange="setField(${pt.id},'status',this.value)">
        <option${s.status==='Pendente'?' selected':''}>Pendente</option>
        <option${s.status==='Em andamento'?' selected':''}>Em andamento</option>
        <option${s.status==='Concluído'?' selected':''}>Concluído</option>
      </select>
    </div>
    <span class="prazo-lbl">Prazo Thai:</span>
    <input class="prazo-input" type="text" placeholder="Ex: 2 dias" value="${s.prazo_real||''}" onchange="setField(${pt.id},'prazo_real',this.value)" title="Prazo real de correção (preencher: Thai)">
    <div class="foot-comment">
      <input type="text" placeholder="Comentário / responsável..." value="${s.comment||''}" onchange="setField(${pt.id},'comment',this.value)">
    </div>
    <div class="chk-box${s.done?' checked':''}" onclick="setField(${pt.id},'done',!getS(${pt.id}).done)" title="Marcar como concluído">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <span class="chk-lbl">Concluído</span>
  </div>
</div>`;
}

function renderAll(){document.getElementById('list').innerHTML=POINTS.map(cardHTML).join('')}

function updateKPIs(){
  let p=0,a=0,d=0;
  POINTS.forEach(pt=>{
    const s=getS(pt.id);
    if(s.status==='Concluído')d++;
    else if(s.status==='Em andamento')a++;
    else p++;
  });
  document.getElementById('kPend').textContent=p;
  document.getElementById('kAnd').textContent=a;
  document.getElementById('kDone').textContent=d;
  const pct=Math.round((d/33)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=d+' de 33 concluídos';
  document.getElementById('progPct').textContent=pct+'%';
}

function applyFilters(){
  const prio=document.getElementById('fPrio').value;
  const status=document.getElementById('fStatus').value;
  const search=document.getElementById('fSearch').value.toLowerCase();
  let vis=0;
  document.querySelectorAll('.card').forEach(c=>{
    const ok=(!prio||c.dataset.prio===prio)&&(!status||c.dataset.status===status)&&(!search||c.dataset.text.includes(search));
    c.classList.toggle('hidden',!ok);
    if(ok)vis++;
  });
  document.getElementById('emptyMsg').classList.toggle('hidden',vis>0);
}

async function init(){
  const ok=await dbLoad();
  document.getElementById('loader').classList.add('hidden');
  renderAll();updateKPIs();
}
init();
</script>
</body>
</html>
